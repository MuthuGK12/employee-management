# ===========================
# Server Config
# ===========================
server.port=8080

# ===========================
# MySQL Database
# ===========================
spring.datasource.url=jdbc:mysql://mysql:3306/employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===========================
# Pagination Defaults
# ===========================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

# ===========================
# Logging
# ===========================
logging.level.com.ems=DEBUG
logging.level.org.springframework.security=INFO
